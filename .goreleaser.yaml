version: 2

builds:
  - binary: plane
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mggarofalo/plane-cli/cmd.version={{.Version}}
      - -X github.com/mggarofalo/plane-cli/cmd.commit={{.ShortCommit}}
      - -X github.com/mggarofalo/plane-cli/cmd.date={{.Date}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Maintenance
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
