version: 2

builds:
  - binary: plane
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mggarofalo/plane-cli/cmd.version={{.Version}}
      - -X github.com/mggarofalo/plane-cli/cmd.commit={{.ShortCommit}}
      - -X github.com/mggarofalo/plane-cli/cmd.date={{.Date}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Maintenance
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: plane
    repository:
      owner: mggarofalo
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/mggarofalo/plane-cli"
    description: "CLI for the Plane project management API"
    license: "MIT"
    install: |
      bin.install "plane"
    test: |
      system "#{bin}/plane", "version"

scoops:
  - name: plane
    repository:
      owner: mggarofalo
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/mggarofalo/plane-cli"
    description: "CLI for the Plane project management API"
    license: "MIT"
